# rsp-provider = { git = "https://github.com/succinctlabs/rsp.git", rev = "12ad0292c702f22c8e3f99980e25ecac4a882854" }
# rsp-client-executor = { git = "https://github.com/succinctlabs/rsp.git", rev = "be2fe1274414a33cab9adb68825dc2eb029c7a4a" }
# rsp-host-executor = { git = "https://github.com/succinctlabs/rsp.git", rev = "be2fe1274414a33cab9adb68825dc2eb029c7a4a" }
# rsp-primitives = { git = "https://github.com/succinctlabs/rsp.git", rev = "be2fe1274414a33cab9adb68825dc2eb029c7a4a" }
# rsp-provider = { git = "https://github.com/succinctlabs/rsp.git", rev = "be2fe1274414a33cab9adb68825dc2eb029c7a4a" }
rsp-client-executor = { path = "../rsp/crates/executor/client" }
rsp-host-executor = { path = "../rsp/crates/executor/host" }
rsp-primitives = { path = "../rsp/crates/primitives" }
rsp-provider = { path = "../rsp/crates/provider" }

reth-ethereum-primitives = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.9.3", features = ["serde", "serde-bincode-compat"] }
reth-primitives-traits = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.9.3", features = ["serde", "serde-bincode-compat"] }
